<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Biometric Photo</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root {
  --ok:   #27ae60;
  --warn: #f2994a;
  --err:  #eb5757;
  --blue: #2f80ed;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background:#000; color:#fff;
  font-family:-apple-system, system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
}

.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.hidden { display:none !important; }

#video {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1);
}
#guideCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

.hint-bar {
  position:absolute; bottom:150px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:6px; z-index:10;
}
.hint-icon { font-size:28px; }
.hint-text {
  font-size:16px; font-weight:700; text-align:center; padding:0 24px;
  text-shadow:0 1px 8px rgba(0,0,0,.9);
}

.capture-area {
  position:absolute; bottom:42px; left:0; right:0;
  display:flex; justify-content:center; align-items:center; gap:32px; z-index:10;
}
.capture-btn {
  width:74px; height:74px; border-radius:50%;
  background:#fff; border:4px solid rgba(255,255,255,.4);
  cursor:pointer; font-size:0; position:relative;
  box-shadow:0 2px 16px rgba(0,0,0,.6); flex-shrink:0;
}
.capture-btn::after {
  content:''; position:absolute; inset:6px; border-radius:50%;
  background:#fff; box-shadow:inset 0 0 0 2px rgba(0,0,0,.12);
}
.capture-btn:active { transform:scale(.9); }

.ring-wrap { position:absolute; inset:0; pointer-events:none; }
.ring-wrap svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
#ringCircle {
  fill:none; stroke:var(--ok); stroke-width:4;
  stroke-dasharray:204; stroke-dashoffset:204;
  stroke-linecap:round; transition:stroke-dashoffset .08s linear;
}

.upload-lbl {
  background:rgba(0,0,0,.45); color:#fff; backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25); border-radius:22px;
  padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer;
  white-space:nowrap;
}
#fileInput { display:none; }

.load-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.72);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; z-index:20;
}
.load-spinner {
  width:40px; height:40px; border-radius:50%;
  border:3px solid rgba(255,255,255,.2); border-top-color:#fff;
  animation:spin .7s linear infinite;
}
.load-text { font-size:14px; color:rgba(255,255,255,.8); }
@keyframes spin { to { transform:rotate(360deg); } }

#screenProcessing { background:#0d1520; gap:20px; }
.proc-spinner {
  width:44px; height:44px; border-radius:50%;
  border:3px solid rgba(255,255,255,.1); border-top-color:var(--blue);
  animation:spin .8s linear infinite;
}
.proc-steps { display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
.pstep { font-size:14px; color:rgba(255,255,255,.3); display:flex; align-items:center; gap:10px; transition:color .3s; }
.pstep.active { color:#fff; font-weight:700; }
.pstep.done   { color:var(--ok); }
.pstep-dot    { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }

#screenResult {
  background:var(--tg-theme-bg-color, #0d1520);
  overflow-y:auto; align-items:stretch; justify-content:flex-start;
}
.result-wrap { max-width:480px; margin:0 auto; padding:14px 12px 120px; display:flex; flex-direction:column; gap:10px; }

.photo-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pcard {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:10px;
}
.pcard-lbl {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,255,255,.35); margin-bottom:8px;
}
.pcard img, .pcard canvas { width:100%; border-radius:6px; display:block; }
.face-badge {
  display:inline-block; margin-top:6px;
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:12px; color:#fff;
}

.checks-card {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:12px;
}
.card-lbl {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,255,255,.35); margin-bottom:10px;
}
.check-item {
  display:flex; align-items:flex-start; gap:8px;
  padding:7px 0; border-bottom:1px solid rgba(255,255,255,.07);
  font-size:12px; line-height:1.4;
}
.check-item:last-child { border-bottom:none; }
.ci-lbl { font-weight:500; }
.ci-det { color:rgba(255,255,255,.4); font-size:11px; }

.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.action-btn, .retake-btn {
  width:100%; padding:12px; border-radius:10px; cursor:pointer;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:#fff; font-size:14px; font-weight:600;
}
.action-btn.primary {
  background:var(--blue); border-color:var(--blue);
}
.action-btn:active, .retake-btn:active { opacity:.7; }

.warn-banner {
  background:rgba(242,153,74,.18); border:1px solid rgba(242,153,74,.45);
  border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.4;
  color:#ffd6a8;
}
</style>
</head>
<body>

<!-- SCREEN 1: Camera -->
<div id="screenCamera" class="screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="guideCanvas"></canvas>

  <div class="load-overlay" id="loadOverlay">
    <div class="load-spinner"></div>
    <div class="load-text" data-i18n="loadingModels">Loading…</div>
  </div>

  <div class="hint-bar">
    <div class="hint-icon" id="hintIcon">👤</div>
    <div class="hint-text" id="hintText" data-i18n="cameraPermission">Allow camera access</div>
  </div>

  <div class="capture-area">
    <div>
      <input type="file" id="fileInput" accept="image/*">
      <label class="upload-lbl" for="fileInput" id="galleryLbl" data-i18n="galleryBtn">📁 Gallery</label>
    </div>
    <div style="position:relative;width:74px;height:74px;flex-shrink:0">
      <div class="ring-wrap">
        <svg width="74" height="74" viewBox="0 0 74 74">
          <circle id="ringCircle" cx="37" cy="37" r="32"/>
        </svg>
      </div>
      <button class="capture-btn" id="captureBtn" aria-label="Snap"></button>
    </div>
    <div style="width:86px"></div>
  </div>
</div>

<!-- SCREEN 2: Processing -->
<div id="screenProcessing" class="screen hidden">
  <div class="proc-spinner"></div>
  <div class="proc-steps">
    <div class="pstep" id="ps1"><div class="pstep-dot"></div><span data-i18n="step1">Face detection</span></div>
    <div class="pstep" id="ps2"><div class="pstep-dot"></div><span data-i18n="step2">Validation</span></div>
    <div class="pstep" id="ps3"><div class="pstep-dot"></div><span data-i18n="step3">Crop 35×45 mm</span></div>
    <div class="pstep" id="ps4"><div class="pstep-dot"></div><span data-i18n="step4">AI processing</span></div>
    <div class="pstep" id="ps5"><div class="pstep-dot"></div><span data-i18n="step5">Identity check</span></div>
  </div>
</div>

<!-- SCREEN 3: Result -->
<div id="screenResult" class="screen hidden">
  <div class="result-wrap">
    <div class="photo-row">
      <div class="pcard">
        <div class="pcard-lbl" data-i18n="originalLbl">Original</div>
        <img id="origThumb" alt="">
      </div>
      <div class="pcard">
        <div class="pcard-lbl" data-i18n="resultLbl">Result</div>
        <canvas id="resultCanvas" width="684" height="883"></canvas>
        <div id="faceBadge" class="face-badge"></div>
      </div>
    </div>

    <div id="warnBanner" class="warn-banner hidden"></div>

    <div class="checks-card">
      <div class="card-lbl" data-i18n="checksLbl">Requirements</div>
      <div id="checks"></div>
    </div>

    <div class="btn-row">
      <button class="action-btn" id="pdfBtn" data-i18n="pdfBtn">📄 A4 PDF (4 photos)</button>
      <button class="action-btn" id="linesBtn" data-i18n="linesBtn">📐 Guide lines</button>
    </div>
    <button class="retake-btn" id="retakeBtn" data-i18n="retakeBtn">↩ Retake</button>
    <div id="pkLine" style="text-align:center;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px;font-family:monospace;margin-top:4px"></div>
  </div>
</div>

// ── Silhouette (camera guide) ─────────────────────────────────
function silGeo(vw, vh) {
  return {
    cx: vw / 2,
    headCy: vh * 0.34,
    headW:  vw * 0.27,
    headH:  vh * 0.21,
    neckW:  vw * 0.10,
    neckBy: vh * 0.60,
    shW:    vw * 0.46,
    shY:    vh * 0.68,
    botY:   vh * 1.10
  };
}
function silPath(g) {
  const p = new Path2D();
  p.moveTo(g.cx - g.headW, g.headCy);
  p.ellipse(g.cx, g.headCy, g.headW, g.headH, 0, Math.PI, 0, false);
  p.bezierCurveTo(g.cx + g.headW * 0.92, g.headCy + g.headH * 1.25, g.cx + g.neckW * 1.4, g.headCy + g.headH * 1.55, g.cx + g.neckW, g.neckBy);
  p.bezierCurveTo(g.cx + g.neckW * 1.9, g.neckBy + (g.shY - g.neckBy) * 0.35, g.cx + g.shW * 0.72, g.shY - (g.shY - g.neckBy) * 0.20, g.cx + g.shW, g.shY);
  p.lineTo(g.cx + g.shW, g.botY); p.lineTo(g.cx - g.shW, g.botY); p.lineTo(g.cx - g.shW, g.shY);
  p.bezierCurveTo(g.cx - g.shW * 0.72, g.shY - (g.shY - g.neckBy) * 0.20, g.cx - g.neckW * 1.9, g.neckBy + (g.shY - g.neckBy) * 0.35, g.cx - g.neckW, g.neckBy);
  p.bezierCurveTo(g.cx - g.neckW * 1.4, g.headCy + g.headH * 1.55, g.cx - g.headW * 0.92, g.headCy + g.headH * 1.25, g.cx - g.headW, g.headCy);
  p.closePath();
  return p;
}

// ── Detection loop (live preview) ─────────────────────────────
function startLoop() {
  const video  = $('video');
  const canvas = $('guideCanvas');
  const ctx    = canvas.getContext('2d');

  async function tick() {
    rafId = requestAnimationFrame(tick);
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh || detecting) return;

    canvas.width = vw; canvas.height = vh;
    ctx.clearRect(0, 0, vw, vh);

    const g = silGeo(vw, vh);
    const path = silPath(g);

    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, vw, vh);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fill(path);
    ctx.restore();

    detecting = true;
    let det = null;
    try {
      det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize:320, scoreThreshold:.35 }))
        .withFaceLandmarks();
    } catch { /* ignore */ }
    detecting = false;

    let status = 'none', hint = t('placeFace'), icon = '👤';
    if (det) {
      const b  = det.detection.box;
      const fcx = b.x + b.width/2, fcy = b.y + b.height/2;
      const sr  = b.height / (g.headH * 2);
      const off = Math.abs(fcx - g.cx) / g.headW;
      const offY = Math.abs(fcy - g.headCy) / g.headH;
      const lm   = det.landmarks;
      const avgY = pts => pts.reduce((s,p) => s+p.y,0) / pts.length;
      const avgX = pts => pts.reduce((s,p) => s+p.x,0) / pts.length;
      const ang  = Math.abs(Math.atan2(
        avgY(lm.getLeftEye()) - avgY(lm.getRightEye()),
        avgX(lm.getRightEye()) - avgX(lm.getLeftEye())
      ) * 180 / Math.PI);

      if      (sr < 0.55)  { status='far';   hint=t('moveCloser');    icon='🔍'; }
      else if (sr > 0.95)  { status='close'; hint=t('moveFurther');   icon='↔️'; }
      else if (off  > 0.4) { status='side';  hint=(fcx<g.cx)?t('moveRight'):t('moveLeft'); icon='↔️'; }
      else if (offY > 0.55){ status='vert';  hint=(fcy<g.headCy)?t('moveDown'):t('moveUp'); icon='↕️'; }
      else if (ang > 5)    { status='tilt';  hint=t('holdStraight');  icon='📐'; }
      else                 { status='ok';    hint=t('perfectHold');   icon='✅'; lastLiveDet = det; }
    }

    if (status === 'ok') {
      goodFrames = Math.min(goodFrames + 1, NEED_GOOD);
      if (goodFrames >= NEED_GOOD) { capture(); return; }
    } else {
      goodFrames = Math.max(0, goodFrames - 3);
    }

    const ring = $('ringCircle');
    ring.style.strokeDashoffset = RING_C * (1 - goodFrames/NEED_GOOD);
    ring.style.opacity = status === 'ok' ? '1' : '0';

    const clr = { none:'rgba(255,255,255,.55)', far:'#f2994a', close:'#f2994a',
                  side:'#f2994a', vert:'#f2994a', tilt:'#f2994a', ok:'#27ae60' }[status];
    ctx.save();
    ctx.strokeStyle = clr; ctx.lineWidth = 3.5; ctx.setLineDash([14, 7]);
    ctx.lineJoin = 'round'; ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8;
    ctx.stroke(path);
    ctx.restore();

    $('hintIcon').textContent = icon;
    $('hintText').textContent = hint;
  }
  rafId = requestAnimationFrame(tick);
}

// ── Validation taxonomy (PhotoAid-style) ─────────────────────
// Each check: { label, test (i18n), isValid, canBeFixed, isMandatory }.
// `canBeFixed` = AI/post-processing can correct it (no retake needed).
// `isMandatory` = blocks delivery when invalid.
function mkCheck(label, isValid, opts = {}) {
  return {
    label,
    test: t('chk_' + label) || label,
    isValid: !!isValid,
    canBeFixed: !!opts.canBeFixed,
    isMandatory: opts.isMandatory !== false,
    detail: opts.detail || '',
  };
}

// Compute Eye Aspect Ratio from 6 landmark points.
function eyeAspectRatio(eye) {
  const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  return (dist(eye[1], eye[5]) + dist(eye[2], eye[4])) / (2 * dist(eye[0], eye[3]));
}

// Approximate head pose from landmarks.
// roll: angle between eyes vs horizontal.
// yaw: asymmetry of nose tip relative to face midline (between eye centers).
// pitch: vertical position of nose tip relative to (eye-mouth) midpoint.
function headPose(lm) {
  const le = lm.getLeftEye(), re = lm.getRightEye();
  const lEye = { x: le.reduce((s,p)=>s+p.x,0)/le.length, y: le.reduce((s,p)=>s+p.y,0)/le.length };
  const rEye = { x: re.reduce((s,p)=>s+p.x,0)/re.length, y: re.reduce((s,p)=>s+p.y,0)/re.length };
  const roll = Math.atan2(rEye.y - lEye.y, rEye.x - lEye.x) * 180 / Math.PI;

  const nose = lm.getNose();
  const noseTip = nose[nose.length - 1];           // tip
  const eyeMidX = (lEye.x + rEye.x) / 2;
  const eyeMidY = (lEye.y + rEye.y) / 2;
  const eyeDist = Math.hypot(rEye.x - lEye.x, rEye.y - lEye.y) || 1;
  // Yaw: nose offset from eye midline horizontally, normalised by eye distance.
  // Empirical scale: ~30° for offset = 0.5 * eyeDist.
  const yaw = ((noseTip.x - eyeMidX) / eyeDist) * 60;

  const mouth = lm.getMouth();
  const mouthMidY = mouth.reduce((s,p)=>s+p.y,0) / mouth.length;
  // Pitch: nose vs (eye-mouth) midpoint, normalised by face height.
  const faceH = mouthMidY - eyeMidY || 1;
  const pitch = ((noseTip.y - (eyeMidY + faceH * 0.55)) / faceH) * 80;

  return { roll, yaw, pitch };
}

// Pre-AI checks. Returns full taxonomy regardless of pass/fail (PhotoAid-style),
// so the result screen can show every gate with its status.
function runPreChecks(snap, allDetections, single) {
  const checks = [];
  const P = ACTIVE_PROFILE;

  // Resolution
  checks.push(mkCheck('MinResolution',
    snap.width >= P.minInputW && snap.height >= P.minInputH,
    { detail: `${snap.width}×${snap.height}` }));

  // Face recognized at all
  const faceCount = (allDetections || []).length || (single ? 1 : 0);
  checks.push(mkCheck('ValidRecognition', faceCount >= 1));

  // Exactly one face
  checks.push(mkCheck('MoreThanOneFace', faceCount === 1, { detail: `${faceCount}` }));

  // Face size in frame
  if (single) {
    const b = single.detection.box;
    const ratio = (b.width * b.height) / (snap.width * snap.height);
    checks.push(mkCheck('MinFaceSize', ratio >= P.minFaceFrameRatio,
      { detail: `${(ratio * 100).toFixed(0)}%` }));
  } else {
    checks.push(mkCheck('MinFaceSize', false));
  }

  // Eyes open (EAR)
  if (single?.landmarks) {
    const earL = eyeAspectRatio(single.landmarks.getLeftEye());
    const earR = eyeAspectRatio(single.landmarks.getRightEye());
    checks.push(mkCheck('EyesOpen', earL >= P.minEar && earR >= P.minEar,
      { detail: `EAR ${earL.toFixed(2)}/${earR.toFixed(2)}` }));
  } else {
    checks.push(mkCheck('EyesOpen', false));
  }

  // Head pose
  if (single?.landmarks) {
    const { roll, yaw, pitch } = headPose(single.landmarks);
    const ok = Math.abs(roll) <= P.maxHeadTiltDeg
            && Math.abs(yaw)  <= P.maxHeadTiltDeg
            && Math.abs(pitch) <= P.maxHeadTiltDeg;
    checks.push(mkCheck('HeadPose', ok,
      { detail: `r${roll.toFixed(0)}° y${yaw.toFixed(0)}° p${pitch.toFixed(0)}°` }));
  } else {
    checks.push(mkCheck('HeadPose', false));
  }

  return checks;
}

// First mandatory failure → user-facing error key for retake. null if all pass.
function firstMandatoryFailure(checks) {
  const failed = checks.find(c => c.isMandatory && !c.isValid);
  if (!failed) return null;
  // Map check label to i18n error key
  const map = {
    MinResolution:    'errLowRes',
    ValidRecognition: 'errNoFace',
    MoreThanOneFace:  'errMultipleFaces',
    MinFaceSize:      'errFaceTooSmall',
    EyesOpen:         'errEyesClosed',
    HeadPose:         'errHeadTilt',
  };
  return map[failed.label] || 'procError';
}

// ── Process pipeline ─────────────────────────────────────────
async function processSnap(snap) {
  const ids = ['ps1','ps2','ps3','ps4','ps5'];
  const step = n => ids.forEach((id,i) =>
    $(id).className = 'pstep' + (i<n?' done':i===n?' active':''));

  try {
    // 1) Face detection (multi for count gate, single for landmarks/descriptor)
    step(0);
    let allDet = [];
    let singleDet = lastLiveDet;

    // Always detect-all for count gate (live det only gives one).
    for (const inputSize of [512, 416, 320, 608, 224]) {
      try {
        allDet = await withTimeout(
          faceapi
            .detectAllFaces(snap, new faceapi.TinyFaceDetectorOptions({ inputSize, scoreThreshold:.3 }))
            .withFaceLandmarks().withFaceDescriptors(),
          5000, `detect@${inputSize}`
        );
        if (allDet && allDet.length) break;
      } catch (e) {
        console.warn(`Detection failed @ inputSize=${inputSize}:`, e);
      }
    }

    if (allDet && allDet.length === 1) {
      singleDet = allDet[0];
    } else if (singleDet && (!allDet || !allDet.length)) {
      // Live det had a face but multi-detect missed it — re-run on snap with descriptor.
      try {
        singleDet = await faceapi
          .detectSingleFace(snap, new faceapi.TinyFaceDetectorOptions({ inputSize:416, scoreThreshold:.2 }))
          .withFaceLandmarks().withFaceDescriptor();
        if (singleDet) allDet = [singleDet];
      } catch {}
    }

    await wait(150);

    // 2) Validation per ТЗ §2.2 + PhotoAid-style taxonomy
    step(1);
    preChecks = runPreChecks(snap, allDet, singleDet);
    const errKey = firstMandatoryFailure(preChecks);
    if (errKey) {
      safeAlert(t(errKey));
      resetToCamera();
      return;
    }
    capturedDet = singleDet;
    originalDescriptor = singleDet.descriptor || null;
    lastLiveDet = null;
    await wait(150);

    // 3) Local crop 35×45 mm
    step(2);
    const cropped = makeCrop(snap, singleDet);
    await wait(150);

    // 4) AI processing via Supabase Edge Function
    step(3);
    let aiImg, aiOk = true;
    serverChecks = []; shortPhotoKey = null;
    try {
      const r = await withTimeout(processWithAI(cropped), 90000, 'AI processing');
      aiImg = r.img;
      shortPhotoKey = r.shortPhotoKey;
      serverChecks = (r.serverChecks || []).map(c =>
        ({ ...c, test: t('chk_' + c.label) || c.label })
      );
    } catch (e) {
      console.error('AI processing failed:', e);
      safeAlert(e.quota ? t('quotaExceeded') : t('aiFailed'));
      aiImg = await c2i(cropped);
      aiOk = false;
      serverChecks = [mkCheck('AiProcessed', false, { isMandatory: true })];
    }
    await wait(150);

    // 5) Identity check (face similarity)
    step(4);
    similarityScore = null;
    processedDescriptor = null;
    if (aiOk && originalDescriptor) {
      try {
        const aiCanvas = mk(aiImg.naturalWidth || aiImg.width, aiImg.naturalHeight || aiImg.height);
        aiCanvas.getContext('2d').drawImage(aiImg, 0, 0);
        const procDet = await withTimeout(
          faceapi
            .detectSingleFace(aiCanvas, new faceapi.TinyFaceDetectorOptions({ inputSize:416, scoreThreshold:.2 }))
            .withFaceLandmarks().withFaceDescriptor(),
          7000, 'similarity-detect'
        );
        if (procDet && procDet.descriptor) {
          processedDescriptor = procDet.descriptor;
          similarityScore = cosineSimilarity(originalDescriptor, procDet.descriptor);
        }
      } catch (e) {
        console.warn('similarity check failed:', e);
      }
    }
    await wait(150);

    capturedImg = aiImg;
    $('origThumb').src = snap.toDataURL('image/jpeg', 0.6);
    showScreen('screenResult');
    await render();
    tg.MainButton.show();

    // Notify bot if similarity gate failed (admin handoff per ТЗ §4)
    if (similarityScore !== null && similarityScore < ACTIVE_PROFILE.minFaceSimilarity) {
      try {
        tg.sendData(JSON.stringify({ event: 'gate_failed', reason: 'low_similarity', score: similarityScore }));
      } catch {}
    }
  } catch (e) {
    console.error('processSnap error:', e);
    safeAlert(t('procError'));
    resetToCamera();
  }
}

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error(label + ' timeout')), ms))
  ]);
}

function safeAlert(msg) {
  try {
    const clean = String(msg).replace(/\s+/g, ' ').trim().slice(0, 200);
    tg.showAlert(clean);
  } catch (e) {
    console.error('Alert failed:', msg, e);
  }
}

// face-api.js descriptors are L2-normalized → cos = 1 - euclidean²/2
function cosineSimilarity(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) || 1);
}

// ── Local crop to 35×45 mm ───────────────────────────────────
function makeCrop(src, det) {
  const b   = det.detection.box;
  const fRatio = 0.75;          // face ≈ 75% of frame height
  const pH  = b.height / fRatio;
  const pW  = pH * ASPECT;
  const cx  = b.x + b.width / 2;
  const cropX = cx - pW / 2;
  const cropY = b.y - pH * 0.16;

  const out = mk(OUT_W, OUT_H);
  const ctx = out.getContext('2d');
  ctx.fillStyle = ACTIVE_PROFILE.background;
  ctx.fillRect(0, 0, OUT_W, OUT_H);

  const sx = Math.max(0, cropX);
  const sy = Math.max(0, cropY);
  const sw = Math.min(src.width  - sx, pW - Math.max(0, -cropX));
  const sh = Math.min(src.height - sy, pH - Math.max(0, -cropY));
  const scX = OUT_W / pW, scY = OUT_H / pH;
  const dx = Math.max(0, -cropX) * scX;
  const dy = Math.max(0, -cropY) * scY;
  ctx.drawImage(src, sx, sy, sw, sh, dx, dy, sw * scX, sh * scY);
  return out;
}

// ── AI via Supabase Edge Function ────────────────────────────
async function processWithAI(canvas) {
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const userId  = tg.initDataUnsafe?.user?.id?.toString() || 'anonymous';

  const res = await fetch(FN_URL, {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${SUPA_ANON}`,
      'apikey':        SUPA_ANON
    },
    body: JSON.stringify({ image: dataUrl, mimeType: 'image/jpeg', userId })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (err.code === 'QUOTA_EXCEEDED' || res.status === 429) {
      const e = new Error(t('quotaExceeded'));
      e.quota = true;
      throw e;
    }
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  if (!data.image) throw new Error('No image in response');

  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload  = () => resolve(im);
    im.onerror = () => reject(new Error('Failed to load AI image'));
    im.src = data.image;
  });
  return {
    img,
    shortPhotoKey: data.shortPhotoKey || null,
    serverChecks: Array.isArray(data.serverChecks) ? data.serverChecks : [],
  };
}

// ── Iterative JPG compression to fit MAX_MB ──────────────────
async function compressToTarget(canvas) {
  for (let q = 95; q >= 70; q -= 5) {
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', q / 100));
    if (!blob) continue;
    const mb = blob.size / 1024 / 1024;
    if (mb <= MAX_MB || q === 70) return { blob, mb, quality: q };
  }
  // Should not reach here, but return last attempt.
  const fallback = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
  return { blob: fallback, mb: fallback.size / 1024 / 1024, quality: 70 };
}

// Draw the AI image (or cropped fallback) onto resultCanvas, optionally with guide lines.
function drawResult() {
  const canvas = $('resultCanvas'), ctx = canvas.getContext('2d');
  canvas.width = OUT_W; canvas.height = OUT_H;
  ctx.fillStyle = ACTIVE_PROFILE.background;
  ctx.fillRect(0, 0, OUT_W, OUT_H);
  if (capturedImg) ctx.drawImage(capturedImg, 0, 0, OUT_W, OUT_H);
  if (showGuideLines) drawGuideLines(ctx);
}

// PhotoAid-style preview-with-lines: top-of-head, eye line, chin, shoulder line.
function drawGuideLines(ctx) {
  ctx.save();
  ctx.strokeStyle = 'rgba(47,128,237,.85)';
  ctx.fillStyle   = 'rgba(47,128,237,.85)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.font = 'bold 11px -apple-system, system-ui, sans-serif';
  // Approximate ICAO/PL biometric guides for a 35×45 portrait with face 70–80% height.
  const lines = [
    { y: 0.10, label: 'top of head' },
    { y: 0.40, label: 'eye line' },
    { y: 0.78, label: 'chin' },
    { y: 0.92, label: 'shoulders' },
  ];
  for (const ln of lines) {
    const y = Math.round(OUT_H * ln.y);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(OUT_W, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillText(ln.label, 8, y - 4);
    ctx.setLineDash([6, 4]);
  }
  ctx.restore();
}

// ── Render result ────────────────────────────────────────────
async function render() {
  drawResult();

  const badge = $('faceBadge');
  badge.textContent = t('badgeAi');
  badge.style.background = 'rgba(39,174,96,.85)';

  // Compress to ≤ 2.5 MB
  const canvas = $('resultCanvas');
  const { blob, mb } = await compressToTarget(canvas);
  lastResultBlob = blob; lastResultMb = mb;

  // Similarity warning banner
  const banner = $('warnBanner');
  if (similarityScore !== null && similarityScore < ACTIVE_PROFILE.minFaceSimilarity) {
    banner.textContent = t('warnSimilarity');
    banner.classList.remove('hidden');
  } else {
    banner.classList.add('hidden');
  }

  renderChecks(mb);
  tg.MainButton.setText(t('downloadJpg', { mb: mb.toFixed(2) }));

  // Short photo key for support
  $('pkLine').textContent = shortPhotoKey ? `${t('pkPrefix')} · ${shortPhotoKey}` : '';
}

// Combine pre-AI + server + post-AI checks into one taxonomy list and render.
function buildFullTaxonomy(mb) {
  const P = ACTIVE_PROFILE;
  const post = [];

  post.push(mkCheck('PhotoRatio', true, { canBeFixed: true }));
  post.push(mkCheck('OutputResolution', OUT_W >= 684 && OUT_H >= 883,
    { canBeFixed: true, detail: `${OUT_W}×${OUT_H} px` }));
  post.push(mkCheck('OutputSize', mb <= MAX_MB,
    { canBeFixed: true, detail: `${mb.toFixed(2)} MB` }));

  if (similarityScore !== null) {
    const pct = Math.round(similarityScore * 100);
    post.push(mkCheck('IdentityPreserved',
      similarityScore >= P.minFaceSimilarity,
      { canBeFixed: false, detail: `${pct}%` }));
  }

  // Order: pre (input) → server (AI) → post (output)
  return [...preChecks, ...serverChecks, ...post];
}

function renderChecks(mb) {
  const items = buildFullTaxonomy(mb);
  $('checks').innerHTML = items.map(i => {
    const icon = i.isValid ? '✅' : (i.isMandatory ? '⚠️' : 'ℹ️');
    const lbl  = i.test || i.label;
    const det  = i.detail || (i.isValid ? '' : (i.canBeFixed ? '' : ''));
    return `<div class="check-item"><span>${icon}</span>
      <div><div class="ci-lbl">${escapeHtml(lbl)}</div>
      ${det ? `<div class="ci-det">${escapeHtml(det)}</div>` : ''}</div></div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── A4 print sheet (2×2 grid of 35×45 mm) ────────────────────
async function generateA4Pdf() {
  if (!capturedImg) return;
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

  // Compose 4 photos centered, gap 5 mm, photo 35×45 mm.
  const PHOTO_W = 35, PHOTO_H = 45, GAP = 5;
  const totalW = PHOTO_W * 2 + GAP;
  const totalH = PHOTO_H * 2 + GAP;
  const startX = (210 - totalW) / 2;
  const startY = (297 - totalH) / 2;

  // Use a high-quality JPEG (no compression for print).
  const canvas = $('resultCanvas');
  const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 2; col++) {
      const x = startX + col * (PHOTO_W + GAP);
      const y = startY + row * (PHOTO_H + GAP);
      pdf.addImage(dataUrl, 'JPEG', x, y, PHOTO_W, PHOTO_H);
      // Thin cut-line border
      pdf.setLineWidth(0.1);
      pdf.setDrawColor(180, 180, 180);
      pdf.rect(x, y, PHOTO_W, PHOTO_H);
    }
  }

  pdf.save('biometric_a4_print.pdf');
}

// ── Controls ─────────────────────────────────────────────────
$('captureBtn').addEventListener('click', capture);
$('retakeBtn').addEventListener('click', resetToCamera);
$('pdfBtn').addEventListener('click', generateA4Pdf);
$('linesBtn').addEventListener('click', () => {
  showGuideLines = !showGuideLines;
  $('linesBtn').textContent = showGuideLines ? t('linesOn') : t('linesBtn');
  drawResult();
});

$('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > ACTIVE_PROFILE.maxInputBytes) { safeAlert(t('errFileSize')); e.target.value = ''; return; }
  stopCamera(); showScreen('screenProcessing');
  const imgEl = await loadImg(file);
  const snap  = mk(imgEl.naturalWidth, imgEl.naturalHeight);
  snap.getContext('2d').drawImage(imgEl, 0, 0);
  await processSnap(snap);
});

tg.MainButton.onClick(() => {
  if (!lastResultBlob) return;
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(lastResultBlob), download: 'biometric_35x45.jpg'
  });
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
});

// ── Helpers ──────────────────────────────────────────────────
function showScreen(n) {
  ['screenCamera','screenProcessing','screenResult'].forEach(id =>
    $(id).classList.toggle('hidden', id!==n));
}
function resetToCamera() {
  tg.MainButton.hide();
  capturedImg = capturedDet = lastLiveDet = null;
  originalDescriptor = processedDescriptor = null;
  similarityScore = null;
  lastResultBlob = null; lastResultMb = 0;
  preChecks = []; serverChecks = []; shortPhotoKey = null;
  showGuideLines = false;
  goodFrames = 0;
  $('warnBanner').classList.add('hidden');
  $('pkLine').textContent = '';
  $('linesBtn').textContent = t('linesBtn');
  $('ringCircle').style.strokeDashoffset = RING_C;
  showScreen('screenCamera'); startCamera();
}
function mk(w,h) { const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }
function c2i(canvas) {
  return new Promise(r => { const i=new Image(); i.onload=()=>r(i); i.src=canvas.toDataURL('image/jpeg',.95); });
}
function loadImg(file) {
  return new Promise((r,j) => {
    const i=new Image(), u=URL.createObjectURL(file);
    i.onload=()=>{ URL.revokeObjectURL(u); r(i); }; i.onerror=j; i.src=u;
  });
}
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

init().catch(console.error);
</script>
