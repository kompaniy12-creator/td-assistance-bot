<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Биометрическое фото</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
<style>
:root {
  --ok:   #27ae60;
  --warn: #f2994a;
  --err:  #eb5757;
  --blue: #2f80ed;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background:#000; color:#fff;
  font-family:-apple-system, system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── Screens ── */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.hidden { display:none !important; }

/* ── Camera ── */
#video {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1);
}
#guideCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

.hint-bar {
  position:absolute; bottom:150px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:6px; z-index:10;
}
.hint-icon { font-size:28px; }
.hint-text {
  font-size:16px; font-weight:700; text-align:center; padding:0 24px;
  text-shadow:0 1px 8px rgba(0,0,0,.9);
}

.capture-area {
  position:absolute; bottom:42px; left:0; right:0;
  display:flex; justify-content:center; align-items:center; gap:32px; z-index:10;
}
.capture-btn {
  width:74px; height:74px; border-radius:50%;
  background:#fff; border:4px solid rgba(255,255,255,.4);
  cursor:pointer; font-size:0; position:relative;
  box-shadow:0 2px 16px rgba(0,0,0,.6); flex-shrink:0;
}
.capture-btn::after {
  content:''; position:absolute; inset:6px; border-radius:50%;
  background:#fff; box-shadow:inset 0 0 0 2px rgba(0,0,0,.12);
}
.capture-btn:active { transform:scale(.9); }

.ring-wrap { position:absolute; inset:0; pointer-events:none; }
.ring-wrap svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
#ringCircle {
  fill:none; stroke:var(--ok); stroke-width:4;
  stroke-dasharray:204; stroke-dashoffset:204;
  stroke-linecap:round; transition:stroke-dashoffset .08s linear;
}

.upload-lbl {
  background:rgba(0,0,0,.45); color:#fff; backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25); border-radius:22px;
  padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer;
  white-space:nowrap;
}
#fileInput { display:none; }

.load-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.72);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; z-index:20;
}
.load-spinner {
  width:40px; height:40px; border-radius:50%;
  border:3px solid rgba(255,255,255,.2); border-top-color:#fff;
  animation:spin .7s linear infinite;
}
.load-text { font-size:14px; color:rgba(255,255,255,.8); }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Processing ── */
#screenProcessing { background:#0d1520; gap:20px; }
.proc-spinner {
  width:44px; height:44px; border-radius:50%;
  border:3px solid rgba(255,255,255,.1); border-top-color:var(--blue);
  animation:spin .8s linear infinite;
}
.proc-steps { display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
.pstep { font-size:14px; color:rgba(255,255,255,.3); display:flex; align-items:center; gap:10px; transition:color .3s; }
.pstep.active { color:#fff; font-weight:700; }
.pstep.done   { color:var(--ok); }
.pstep-dot    { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* ── Result ── */
#screenResult {
  background:var(--tg-theme-bg-color, #0d1520);
  overflow-y:auto; align-items:stretch; justify-content:flex-start;
}
.result-wrap { max-width:480px; margin:0 auto; padding:14px 12px 120px; display:flex; flex-direction:column; gap:10px; }

.photo-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pcard {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:10px;
}
.pcard-lbl {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,255,255,.35); margin-bottom:8px;
}
.pcard img, .pcard canvas { width:100%; border-radius:6px; display:block; }
.face-badge {
  display:inline-block; margin-top:6px;
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:12px; color:#fff;
}

.ctrl-card, .checks-card {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:12px;
}
.card-lbl {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,255,255,.35); margin-bottom:10px;
}
.ctrl-row { margin-bottom:10px; }
.ctrl-row:last-child { margin-bottom:0; }
.ctrl-head { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,.45); margin-bottom:4px; }
.ctrl-val  { color:var(--blue); font-weight:700; }
input[type=range] { width:100%; accent-color:var(--blue); cursor:pointer; }

.check-item {
  display:flex; align-items:flex-start; gap:8px;
  padding:7px 0; border-bottom:1px solid rgba(255,255,255,.07);
  font-size:12px; line-height:1.4;
}
.check-item:last-child { border-bottom:none; }
.ci-lbl { font-weight:500; }
.ci-det { color:rgba(255,255,255,.4); font-size:11px; }

.retake-btn {
  width:100%; padding:12px; border-radius:10px; cursor:pointer;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:#fff; font-size:14px; font-weight:600;
}
.retake-btn:active { opacity:.7; }
</style>
</head>
<body>

<!-- SCREEN 1: Camera -->
<div id="screenCamera" class="screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="guideCanvas"></canvas>

  <div class="load-overlay" id="loadOverlay">
    <div class="load-spinner"></div>
    <div class="load-text">Загрузка моделей…</div>
  </div>

  <div class="hint-bar">
    <div class="hint-icon" id="hintIcon">👤</div>
    <div class="hint-text" id="hintText">Разрешите доступ к камере</div>
  </div>

  <div class="capture-area">
    <div>
      <input type="file" id="fileInput" accept="image/*">
      <label class="upload-lbl" for="fileInput">📁 Галерея</label>
    </div>
    <div style="position:relative;width:74px;height:74px;flex-shrink:0">
      <div class="ring-wrap">
        <svg width="74" height="74" viewBox="0 0 74 74">
          <circle id="ringCircle" cx="37" cy="37" r="32"/>
        </svg>
      </div>
      <button class="capture-btn" id="captureBtn" aria-label="Снимок"></button>
    </div>
    <div style="width:86px"></div>
  </div>
</div>

<!-- SCREEN 2: Processing -->
<div id="screenProcessing" class="screen hidden">
  <div class="proc-spinner"></div>
  <div class="proc-steps">
    <div class="pstep" id="ps1"><div class="pstep-dot"></div>Определение лица</div>
    <div class="pstep" id="ps2"><div class="pstep-dot"></div>Удаление фона</div>
    <div class="pstep" id="ps3"><div class="pstep-dot"></div>Ретушь кожи</div>
    <div class="pstep" id="ps4"><div class="pstep-dot"></div>Кадрирование 35×45 мм</div>
  </div>
</div>

<!-- SCREEN 3: Result -->
<div id="screenResult" class="screen hidden">
  <div class="result-wrap">
    <div class="photo-row">
      <div class="pcard">
        <div class="pcard-lbl">Оригинал</div>
        <img id="origThumb" alt="">
      </div>
      <div class="pcard">
        <div class="pcard-lbl">Результат</div>
        <canvas id="resultCanvas" width="684" height="883"></canvas>
        <div id="faceBadge" class="face-badge"></div>
      </div>
    </div>
    <div class="ctrl-card">
      <div class="card-lbl">Настройка кадра</div>
      <div class="ctrl-row">
        <div class="ctrl-head"><span>Смещение вверх / вниз</span><span class="ctrl-val" id="vPosLbl">0</span></div>
        <input type="range" id="vPos" min="-100" max="100" value="0">
      </div>
      <div class="ctrl-row">
        <div class="ctrl-head"><span>Размер лица в кадре</span><span class="ctrl-val" id="scaleLbl">75%</span></div>
        <input type="range" id="faceScale" min="60" max="85" value="75">
      </div>
      <div class="ctrl-row">
        <div class="ctrl-head"><span>Качество JPG</span><span class="ctrl-val" id="qualLbl">92%</span></div>
        <input type="range" id="jpgQual" min="55" max="99" value="92">
      </div>
    </div>
    <div class="checks-card">
      <div class="card-lbl">Проверка требований</div>
      <div id="checks"></div>
    </div>
    <button class="retake-btn" id="retakeBtn">↩ Переснять</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
tg.MainButton.setText('⬇ Скачать фото');

const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
const OUT_W = 684, OUT_H = 883, ASPECT = 35/45, MAX_MB = 2.5;
const RING_C = 2 * Math.PI * 32;
const NEED_GOOD = 18;

let ready = false, segment = null, stream = null;
let rafId = null, detecting = false, goodFrames = 0;
let capturedImg = null, capturedDet = null;
let vOff = 0, fRatio = 0.75, jpgQ = 0.92;

const $ = id => document.getElementById(id);

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

  segment = new SelfieSegmentation({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
  });
  segment.setOptions({ modelSelection: 1 });

  ready = true;
  $('loadOverlay').classList.add('hidden');
  await startCamera();
}

// ── Camera ────────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:1280} }, audio:false
    });
    $('video').srcObject = stream;
    await new Promise(r => $('video').onloadedmetadata = r);
    $('hintText').textContent = 'Поместите лицо в овал';
    startLoop();
  } catch {
    $('video').style.display = 'none';
    $('guideCanvas').style.display = 'none';
    $('hintIcon').textContent = '📁';
    $('hintText').textContent = 'Нажмите «Галерея» для выбора фото';
  }
}

function stopCamera() {
  if (rafId)  { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

// ── Detection loop ────────────────────────────────────────────
function startLoop() {
  const video  = $('video');
  const canvas = $('guideCanvas');
  const ctx    = canvas.getContext('2d');

  async function tick() {
    rafId = requestAnimationFrame(tick);
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh || detecting) return;

    canvas.width = vw; canvas.height = vh;
    ctx.clearRect(0, 0, vw, vh);

    // Oval guide geometry
    const ow = vw * 0.62, oh = ow * 1.28;
    const ox = vw / 2,    oy = vh * 0.45;

    // Vignette outside oval
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.58)';
    ctx.fillRect(0, 0, vw, vh);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.ellipse(ox, oy, ow/2, oh/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Face detection
    detecting = true;
    let det = null;
    try {
      det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize:320, scoreThreshold:.35 }))
        .withFaceLandmarks();
    } catch { /* ignore */ }
    detecting = false;

    // Evaluate position
    let status = 'none', hint = '👤  Поместите лицо в овал', icon = '👤';

    if (det) {
      const b  = det.detection.box;
      const cx = b.x + b.width/2, cy = b.y + b.height/2;
      const sr = b.height / oh;
      const ox2 = Math.abs(cx - ox) / (ow/2);
      const oy2 = Math.abs(cy - oy) / (oh/2);

      const lm   = det.landmarks;
      const avgY = pts => pts.reduce((s,p) => s+p.y,0) / pts.length;
      const avgX = pts => pts.reduce((s,p) => s+p.x,0) / pts.length;
      const ang  = Math.abs(Math.atan2(
        avgY(lm.getLeftEye()) - avgY(lm.getRightEye()),
        avgX(lm.getRightEye()) - avgX(lm.getLeftEye())
      ) * 180 / Math.PI);

      if      (sr < 0.52)  { status='far';   hint='🔍  Подойдите ближе';        icon='🔍'; }
      else if (sr > 0.96)  { status='close'; hint='↔️  Отойдите дальше';         icon='↔️'; }
      else if (ox2 > 0.32) { status='side';  hint=(cx<ox)?'→  Вправо':'←  Влево'; icon='↔️'; }
      else if (oy2 > 0.32) { status='vert';  hint=(cy<oy)?'↓  Вниз':'↑  Вверх';  icon='↕️'; }
      else if (ang > 5)    { status='tilt';  hint='📐  Держите голову ровно';     icon='📐'; }
      else                 { status='ok';    hint='✅  Хорошо! Держите…';         icon='✅'; }
    }

    // Countdown / auto-capture
    if (status === 'ok') {
      goodFrames = Math.min(goodFrames + 1, NEED_GOOD);
      if (goodFrames >= NEED_GOOD) { capture(); return; }
    } else {
      goodFrames = Math.max(0, goodFrames - 3);
    }

    const ring = $('ringCircle');
    ring.style.strokeDashoffset = RING_C * (1 - goodFrames/NEED_GOOD);
    ring.style.opacity = status === 'ok' ? '1' : '0';

    // Oval border
    const clr = { none:'rgba(255,255,255,.45)', far:'#f2994a', close:'#f2994a',
                  side:'#f2994a', vert:'#f2994a', tilt:'#f2994a', ok:'#27ae60' }[status];
    ctx.save();
    ctx.strokeStyle = clr; ctx.lineWidth = 3; ctx.setLineDash([14,7]);
    ctx.beginPath(); ctx.ellipse(ox, oy, ow/2, oh/2, 0, 0, Math.PI*2); ctx.stroke();
    [[ox, oy-oh/2],[ox, oy+oh/2],[ox-ow/2, oy],[ox+ow/2, oy]].forEach(([x,y]) => {
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2);
      ctx.fillStyle = clr; ctx.fill();
    });
    ctx.restore();

    $('hintIcon').textContent = icon;
    $('hintText').textContent = hint;
  }

  rafId = requestAnimationFrame(tick);
}

// ── Capture ───────────────────────────────────────────────────
async function capture() {
  stopCamera();
  showScreen('screenProcessing');

  const video = $('video');
  const vw = video.videoWidth || 1280, vh = video.videoHeight || 1280;
  const snap = mk(vw, vh);
  const sctx = snap.getContext('2d');
  sctx.translate(vw, 0); sctx.scale(-1, 1); // un-mirror selfie
  sctx.drawImage(video, 0, 0);

  await processSnap(snap);
}

// ── Process ───────────────────────────────────────────────────
async function processSnap(snap) {
  const ids = ['ps1','ps2','ps3','ps4'];
  const step = n => ids.forEach((id,i) =>
    $(id).className = 'pstep' + (i<n?' done':i===n?' active':''));

  step(0);
  const imgEl = await c2i(snap);
  const det = await faceapi
    .detectSingleFace(imgEl, new faceapi.TinyFaceDetectorOptions({ inputSize:512, scoreThreshold:.3 }))
    .withFaceLandmarks();

  if (!det) { tg.showAlert('Лицо не обнаружено. Попробуйте ещё раз.'); resetToCamera(); return; }
  capturedDet = det;
  await wait(350);

  step(1);
  const noBg = await removeBg(snap);
  await wait(350);

  step(2);
  const retouched = retouch(noBg);
  await wait(300);

  step(3);
  capturedImg = await c2i(retouched);
  await wait(300);

  $('origThumb').src = snap.toDataURL('image/jpeg', 0.6);
  resetSliders();
  showScreen('screenResult');
  render();
  tg.MainButton.show();
}

// ── Background removal ────────────────────────────────────────
function removeBg(src) {
  return new Promise(resolve => {
    const out = mk(src.width, src.height);
    const ctx = out.getContext('2d');

    segment.onResults(({ segmentationMask }) => {
      ctx.fillStyle = '#f0f0ee';
      ctx.fillRect(0, 0, out.width, out.height);

      const tmp = mk(src.width, src.height);
      const tc  = tmp.getContext('2d');
      tc.drawImage(src, 0, 0);
      tc.globalCompositeOperation = 'destination-in';
      tc.drawImage(segmentationMask, 0, 0, src.width, src.height);

      ctx.drawImage(tmp, 0, 0);
      resolve(out);
    });

    segment.send({ image: src }).catch(() => {
      // Fallback: white bg + original
      ctx.fillStyle = '#f0f0ee'; ctx.fillRect(0, 0, src.width, src.height);
      ctx.drawImage(src, 0, 0); resolve(out);
    });
  });
}

// ── Skin retouch ─────────────────────────────────────────────
function retouch(src) {
  const w = src.width, h = src.height;
  const out = mk(w, h), octx = out.getContext('2d');

  // Create blurred copy
  octx.filter = 'blur(1.5px)'; octx.drawImage(src, 0, 0); octx.filter = 'none';
  const blur = octx.getImageData(0, 0, w, h).data;

  octx.drawImage(src, 0, 0);
  const img = octx.getImageData(0, 0, w, h), d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
    if (a < 20) continue;
    const skin = r>80 && g>50 && b>30 && r>g && r>b && (r-Math.min(g,b))>18 && r<252;
    if (skin) {
      d[i]   = Math.round(r*.60 + blur[i]  *.40);
      d[i+1] = Math.round(g*.60 + blur[i+1]*.40);
      d[i+2] = Math.round(b*.60 + blur[i+2]*.40);
    }
  }
  octx.putImageData(img, 0, 0);
  return out;
}

// ── Render result ─────────────────────────────────────────────
function render() {
  if (!capturedImg || !capturedDet) return;
  const crop = calcCrop();
  drawResult(crop); validate(crop);
}

function calcCrop() {
  const b  = capturedDet.detection.box;
  const pH = b.height / fRatio, pW = pH * ASPECT;
  return { x: b.x+b.width/2 - pW/2, y: b.y - pH*.08 - vOff, w: pW, h: pH };
}

function drawResult(crop) {
  const canvas = $('resultCanvas'), ctx = canvas.getContext('2d');
  canvas.width = OUT_W; canvas.height = OUT_H;
  ctx.fillStyle = '#f0f0ee'; ctx.fillRect(0, 0, OUT_W, OUT_H);

  const scX = OUT_W/crop.w, scY = OUT_H/crop.h;
  const sx = Math.max(0, crop.x), sy = Math.max(0, crop.y);
  const sw = Math.min(capturedImg.naturalWidth  - sx, crop.w - Math.max(0,-crop.x));
  const sh = Math.min(capturedImg.naturalHeight - sy, crop.h - Math.max(0,-crop.y));
  ctx.drawImage(capturedImg, sx, sy, sw, sh,
    Math.max(0,-crop.x)*scX, Math.max(0,-crop.y)*scY, sw*scX, sh*scY);

  const b   = capturedDet.detection.box;
  const pct = b.height / crop.h;
  const fty = (b.y - Math.max(0,crop.y)) / crop.h * OUT_H;
  const fhy = b.height / crop.h * OUT_H;
  const ok  = pct>=0.70 && pct<=0.80;

  ctx.save();
  ctx.strokeStyle = ok ? 'rgba(39,174,96,.7)' : 'rgba(235,87,87,.7)';
  ctx.lineWidth = 2; ctx.setLineDash([6,4]);
  ctx.strokeRect(OUT_W*.04, fty, OUT_W*.92, fhy);
  ctx.restore();

  const badge = $('faceBadge');
  badge.textContent = Math.round(pct*100) + '% лица';
  badge.style.background = ok ? 'rgba(39,174,96,.85)' : 'rgba(235,87,87,.85)';
}

function validate(crop) {
  const pct = capturedDet.detection.box.height / crop.h;
  const fOk = pct>=0.70 && pct<=0.80;
  $('resultCanvas').toBlob(blob => {
    const mb = blob.size/1024/1024, mbOk = mb<=MAX_MB;
    $('checks').innerHTML = [
      { ok:true, l:'Лицо обнаружено',                      d:'Автоматически' },
      { ok:fOk,  l:`Лицо ${Math.round(pct*100)}% (70–80%)`,d:fOk?'В норме':'Настройте «Размер лица»' },
      { ok:true, l:'Фон удалён',                           d:'Заменён на светлый' },
      { ok:true, l:'Ретушь кожи',                          d:'Применена' },
      { ok:true, l:`${OUT_W}×${OUT_H} px`,                 d:'Мин. 684×883 ✓' },
      { ok:mbOk, l:`${mb.toFixed(2)} МБ`,                  d:mbOk?'Макс. 2.5 МБ ✓':'Снизьте JPG' },
    ].map(i=>`<div class="check-item"><span>${i.ok?'✅':'⚠️'}</span>
      <div><div class="ci-lbl">${i.l}</div><div class="ci-det">${i.d}</div></div></div>`).join('');
    tg.MainButton.setText(`⬇ Скачать JPG · ${mb.toFixed(2)} МБ`);
  }, 'image/jpeg', jpgQ);
}

// ── Controls ──────────────────────────────────────────────────
$('vPos').addEventListener('input', function() {
  vOff=+this.value; $('vPosLbl').textContent=vOff>0?'+'+vOff:vOff; render();
});
$('faceScale').addEventListener('input', function() {
  fRatio=+this.value/100; $('scaleLbl').textContent=this.value+'%'; render();
});
$('jpgQual').addEventListener('input', function() {
  jpgQ=+this.value/100; $('qualLbl').textContent=this.value+'%'; render();
});

$('captureBtn').addEventListener('click', capture);

$('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  stopCamera(); showScreen('screenProcessing');
  const imgEl = await loadImg(file);
  const snap  = mk(imgEl.naturalWidth, imgEl.naturalHeight);
  snap.getContext('2d').drawImage(imgEl, 0, 0);
  await processSnap(snap);
});

$('retakeBtn').addEventListener('click', resetToCamera);

tg.MainButton.onClick(() => {
  $('resultCanvas').toBlob(blob => {
    const a = Object.assign(document.createElement('a'), {
      href:URL.createObjectURL(blob), download:'biometric_photo.jpg'
    });
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }, 'image/jpeg', jpgQ);
});

// ── Helpers ───────────────────────────────────────────────────
function showScreen(n) {
  ['screenCamera','screenProcessing','screenResult'].forEach(id =>
    $(id).classList.toggle('hidden', id!==n));
}
function resetToCamera() {
  tg.MainButton.hide();
  capturedImg = capturedDet = null; goodFrames = 0; resetSliders();
  $('ringCircle').style.strokeDashoffset = RING_C;
  showScreen('screenCamera'); startCamera();
}
function resetSliders() {
  vOff=0; fRatio=0.75; jpgQ=0.92;
  $('vPos').value=0;      $('vPosLbl').textContent='0';
  $('faceScale').value=75; $('scaleLbl').textContent='75%';
  $('jpgQual').value=92;   $('qualLbl').textContent='92%';
}
function mk(w,h) { const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }
function c2i(canvas) {
  return new Promise(r => { const i=new Image(); i.onload=()=>r(i); i.src=canvas.toDataURL('image/jpeg',.95); });
}
function loadImg(file) {
  return new Promise((r,j) => {
    const i=new Image(), u=URL.createObjectURL(file);
    i.onload=()=>{ URL.revokeObjectURL(u); r(i); }; i.onerror=j; i.src=u;
  });
}
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

init().catch(console.error);
</script>
</body>
</html>
