<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Биометрическое фото</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
<style>
:root {
  --ok:   #27ae60;
  --warn: #f2994a;
  --err:  #eb5757;
  --blue: #2f80ed;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background:#000; color:#fff;
  font-family:-apple-system, system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── Screens ── */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.hidden { display:none !important; }

/* ── Camera ── */
#video {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1);
}
#guideCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

.hint-bar {
  position:absolute; bottom:150px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:6px; z-index:10;
}
.hint-icon { font-size:28px; }
.hint-text {
  font-size:16px; font-weight:700; text-align:center; padding:0 24px;
  text-shadow:0 1px 8px rgba(0,0,0,.9);
}

.capture-area {
  position:absolute; bottom:42px; left:0; right:0;
  display:flex; justify-content:center; align-items:center; gap:32px; z-index:10;
}
.capture-btn {
  width:74px; height:74px; border-radius:50%;
  background:#fff; border:4px solid rgba(255,255,255,.4);
  cursor:pointer; font-size:0; position:relative;
  box-shadow:0 2px 16px rgba(0,0,0,.6); flex-shrink:0;
}
.capture-btn::after {
  content:''; position:absolute; inset:6px; border-radius:50%;
  background:#fff; box-shadow:inset 0 0 0 2px rgba(0,0,0,.12);
}
.capture-btn:active { transform:scale(.9); }

.ring-wrap { position:absolute; inset:0; pointer-events:none; }
.ring-wrap svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
#ringCircle {
  fill:none; stroke:var(--ok); stroke-width:4;
  stroke-dasharray:204; stroke-dashoffset:204;
  stroke-linecap:round; transition:stroke-dashoffset .08s linear;
}

.upload-lbl {
  background:rgba(0,0,0,.45); color:#fff; backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25); border-radius:22px;
  padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer;
  white-space:nowrap;
}
#fileInput { display:none; }

.load-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.72);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; z-index:20;
}
.load-spinner {
  width:40px; height:40px; border-radius:50%;
  border:3px solid rgba(255,255,255,.2); border-top-color:#fff;
  animation:spin .7s linear infinite;
}
.load-text { font-size:14px; color:rgba(255,255,255,.8); }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Processing ── */
#screenProcessing { background:#0d1520; gap:20px; }
.proc-spinner {
  width:44px; height:44px; border-radius:50%;
  border:3px solid rgba(255,255,255,.1); border-top-color:var(--blue);
  animation:spin .8s linear infinite;
}
.proc-steps { display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
.pstep { font-size:14px; color:rgba(255,255,255,.3); display:flex; align-items:center; gap:10px; transition:color .3s; }
.pstep.active { color:#fff; font-weight:700; }
.pstep.done   { color:var(--ok); }
.pstep-dot    { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* ── Result ── */
#screenResult {
  background:var(--tg-theme-bg-color, #0d1520);
  overflow-y:auto; align-items:stretch; justify-content:flex-start;
}
.result-wrap { max-width:480px; margin:0 auto; padding:14px 12px 120px; display:flex; flex-direction:column; gap:10px; }

.photo-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pcard {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:10px;
}
.pcard-lbl {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,255,255,.35); margin-bottom:8px;
}
.pcard img, .pcard canvas { width:100%; border-radius:6px; display:block; }
.face-badge {
  display:inline-block; margin-top:6px;
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:12px; color:#fff;
}

.ctrl-card, .checks-card {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:12px;
}
.card-lbl {
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,255,255,.35); margin-bottom:10px;
}
.ctrl-row { margin-bottom:10px; }
.ctrl-row:last-child { margin-bottom:0; }
.ctrl-head { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,.45); margin-bottom:4px; }
.ctrl-val  { color:var(--blue); font-weight:700; }
input[type=range] { width:100%; accent-color:var(--blue); cursor:pointer; }

.check-item {
  display:flex; align-items:flex-start; gap:8px;
  padding:7px 0; border-bottom:1px solid rgba(255,255,255,.07);
  font-size:12px; line-height:1.4;
}
.check-item:last-child { border-bottom:none; }
.ci-lbl { font-weight:500; }
.ci-det { color:rgba(255,255,255,.4); font-size:11px; }

.retake-btn {
  width:100%; padding:12px; border-radius:10px; cursor:pointer;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:#fff; font-size:14px; font-weight:600;
}
.retake-btn:active { opacity:.7; }
</style>
</head>
<body>

<!-- SCREEN 1: Camera -->
<div id="screenCamera" class="screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="guideCanvas"></canvas>

  <div class="load-overlay" id="loadOverlay">
    <div class="load-spinner"></div>
    <div class="load-text">Загрузка моделей…</div>

  <div class="hint-bar">

  </div>

  <div class="capture-area">
    <div>
      <input type="file" id="fileInput" accept="image/*">

    <div style="position:relative;width:74px;height:74px;flex-shrink:0">

          <circle id="ringCircle" cx="37" cy="37" r="32"/>

<!-- SCREEN 2: Processing -->
<div id="screenProcessing" class="screen hidden">
  <div class="proc-spinner"></div>
  <div class="proc-steps">
    <div class="pstep" id="ps1"><div class="pstep-dot"></div>Распознавание лица</div>
    <div class="pstep" id="ps2"><div class="pstep-dot"></div>Кадрирование 35×45 мм</div>
    <div class="pstep" id="ps3"><div class="pstep-dot"></div>AI-обработка (Nano Banana)</div>
    <div class="pstep" id="ps4"><div class="pstep-dot"></div>Готово</div>
  </div>
</div>

<!-- SCREEN 3: Result -->
<div id="screenResult" class="screen hidden">
  <div class="result-wrap">
    <div class="photo-row">
      <div class="pcard">
        <div class="pcard-lbl">Оригинал</div>
        <img id="origThumb" alt="">
      </div>
      <div class="pcard">
        <div class="pcard-lbl">Результат</div>
        <canvas id="resultCanvas" width="684" height="883"></canvas>
        <div id="faceBadge" class="face-badge"></div>
      </div>
    </div>
    <div class="ctrl-card">
      <div class="card-lbl">Настройка</div>
      <div class="ctrl-row" style="display:none">
        <div class="ctrl-head"><span>Смещение вверх / вниз</span><span class="ctrl-val" id="vPosLbl">0</span></div>
        <input type="range" id="vPos" min="-100" max="100" value="0">
      </div>
      <div class="ctrl-row" style="display:none">
        <div class="ctrl-head"><span>Размер лица в кадре</span><span class="ctrl-val" id="scaleLbl">75%</span></div>
        <input type="range" id="faceScale" min="60" max="85" value="75">
      </div>
      <div class="ctrl-row">
        <div class="ctrl-head"><span>Качество JPG</span><span class="ctrl-val" id="qualLbl">92%</span></div>
        <input type="range" id="jpgQual" min="55" max="99" value="92">
      </div>
    </div>
    <div class="checks-card">
      <div class="card-lbl">Проверка требований</div>
      <div id="checks"></div>
    </div>
    <button class="retake-btn" id="retakeBtn">↩ Переснять</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
tg.MainButton.setText('⬇ Скачать фото');

const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
const OUT_W = 684, OUT_H = 883, ASPECT = 35/45, MAX_MB = 2.5;
const RING_C = 2 * Math.PI * 32;
const NEED_GOOD = 18;

// ── Supabase Edge Function ────────────────────────────────────
const SUPA_URL  = 'https://bltbuptzsswaislqagwe.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsdGJ1cHR6c3N3YWlzbHFhZ3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzU1OTQsImV4cCI6MjA4ODY1MTU5NH0.OQk3TwVSaepYdQFAOXIa3GFhu_jvCgZ7LDi1rqrFgN0';
const FN_URL    = `${SUPA_URL}/functions/v1/process-photo`;

let ready = false, segment = null, stream = null;
let rafId = null, detecting = false, goodFrames = 0;
let capturedImg = null, capturedDet = null;
let lastLiveDet = null;       // most recent good detection from live video
let vOff = 0, fRatio = 0.75, jpgQ = 0.92;

const $ = id => document.getElementById(id);

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

  segment = new SelfieSegmentation({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
  });
  segment.setOptions({ modelSelection: 1 });

  ready = true;
  $('loadOverlay').classList.add('hidden');
  await startCamera();
}

// ── Camera ────────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:1280} }, audio:false
    });
    $('video').srcObject = stream;
    await new Promise(r => $('video').onloadedmetadata = r);
    $('hintText').textContent = 'Поместите лицо в овал';
    startLoop();
  } catch {
    $('video').style.display = 'none';
    $('guideCanvas').style.display = 'none';
    $('hintIcon').textContent = '📁';
    $('hintText').textContent = 'Нажмите «Галерея» для выбора фото';
  }
}

function stopCamera() {
  if (rafId)  { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

// ── Silhouette geometry & path ────────────────────────────────
function silGeo(vw, vh) {
  return {
    cx: vw / 2,
    headCy: vh * 0.34,        // center y of head ellipse
    headW:  vw * 0.27,        // half-width of head
    headH:  vh * 0.21,        // half-height of head
    neckW:  vw * 0.10,        // half-width of neck
    neckBy: vh * 0.60,        // y where neck meets shoulders
    shW:    vw * 0.46,        // half-width of shoulders
    shY:    vh * 0.68,        // y of shoulder peak
    botY:   vh * 1.10         // off-screen bottom
  };
}

function silPath(g) {
  const p = new Path2D();
  // Head ellipse
  p.moveTo(g.cx - g.headW, g.headCy);
  p.ellipse(g.cx, g.headCy, g.headW, g.headH, 0, Math.PI, 0, false);
  // Right: head bottom → neck → shoulder
  p.bezierCurveTo(
    g.cx + g.headW * 0.92, g.headCy + g.headH * 1.25,
    g.cx + g.neckW * 1.4,  g.headCy + g.headH * 1.55,
    g.cx + g.neckW,        g.neckBy
  );
  p.bezierCurveTo(
    g.cx + g.neckW * 1.9,  g.neckBy + (g.shY - g.neckBy) * 0.35,
    g.cx + g.shW * 0.72,   g.shY - (g.shY - g.neckBy) * 0.20,
    g.cx + g.shW,          g.shY
  );
  // Down right + bottom + up left
  p.lineTo(g.cx + g.shW, g.botY);
  p.lineTo(g.cx - g.shW, g.botY);
  p.lineTo(g.cx - g.shW, g.shY);
  // Left: shoulder → neck → head
  p.bezierCurveTo(
    g.cx - g.shW * 0.72,   g.shY - (g.shY - g.neckBy) * 0.20,
    g.cx - g.neckW * 1.9,  g.neckBy + (g.shY - g.neckBy) * 0.35,
    g.cx - g.neckW,        g.neckBy
  );
  p.bezierCurveTo(
    g.cx - g.neckW * 1.4,  g.headCy + g.headH * 1.55,
    g.cx - g.headW * 0.92, g.headCy + g.headH * 1.25,
    g.cx - g.headW,        g.headCy
  );
  p.closePath();
  return p;
}

// ── Detection loop ────────────────────────────────────────────
function startLoop() {
  const video  = $('video');
  const canvas = $('guideCanvas');
  const ctx    = canvas.getContext('2d');

  async function tick() {
    rafId = requestAnimationFrame(tick);
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh || detecting) return;

    canvas.width = vw; canvas.height = vh;
    ctx.clearRect(0, 0, vw, vh);

    const g = silGeo(vw, vh);
    const path = silPath(g);

    // Vignette outside silhouette
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, vw, vh);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fill(path);
    ctx.restore();

    // Face detection
    detecting = true;
    let det = null;
    try {
      det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize:320, scoreThreshold:.35 }))
        .withFaceLandmarks();
    } catch { /* ignore */ }
    detecting = false;

    // Evaluate position vs head ellipse
    let status = 'none', hint = '👤  Встаньте в контур', icon = '👤';

    if (det) {
      const b  = det.detection.box;
      const fcx = b.x + b.width/2, fcy = b.y + b.height/2;
      // face height vs head ellipse height (face = forehead→chin ≈ 80% of head)
      const sr  = b.height / (g.headH * 2);
      const off = Math.abs(fcx - g.cx) / g.headW;
      const offY = Math.abs(fcy - g.headCy) / g.headH;

      const lm   = det.landmarks;
      const avgY = pts => pts.reduce((s,p) => s+p.y,0) / pts.length;
      const avgX = pts => pts.reduce((s,p) => s+p.x,0) / pts.length;
      const ang  = Math.abs(Math.atan2(
        avgY(lm.getLeftEye()) - avgY(lm.getRightEye()),
        avgX(lm.getRightEye()) - avgX(lm.getLeftEye())
      ) * 180 / Math.PI);

      if      (sr < 0.55)  { status='far';   hint='🔍  Подойдите ближе';            icon='🔍'; }
      else if (sr > 0.95)  { status='close'; hint='↔️  Отойдите дальше';             icon='↔️'; }
      else if (off  > 0.4) { status='side';  hint=(fcx<g.cx)?'→  Вправо':'←  Влево'; icon='↔️'; }
      else if (offY > 0.55){ status='vert';  hint=(fcy<g.headCy)?'↓  Вниз':'↑  Вверх'; icon='↕️'; }
      else if (ang > 5)    { status='tilt';  hint='📐  Держите голову ровно';        icon='📐'; }
      else                 { status='ok';    hint='✅  Хорошо! Держите…';            icon='✅'; lastLiveDet = det; }
    }

    // Countdown / auto-capture
    if (status === 'ok') {
      goodFrames = Math.min(goodFrames + 1, NEED_GOOD);
      if (goodFrames >= NEED_GOOD) { capture(); return; }
    } else {
      goodFrames = Math.max(0, goodFrames - 3);
    }

    const ring = $('ringCircle');
    ring.style.strokeDashoffset = RING_C * (1 - goodFrames/NEED_GOOD);
    ring.style.opacity = status === 'ok' ? '1' : '0';

    // Silhouette outline
    const clr = { none:'rgba(255,255,255,.55)', far:'#f2994a', close:'#f2994a',
                  side:'#f2994a', vert:'#f2994a', tilt:'#f2994a', ok:'#27ae60' }[status];
    ctx.save();
    ctx.strokeStyle = clr;
    ctx.lineWidth = 3.5;
    ctx.setLineDash([14, 7]);
    ctx.lineJoin = 'round';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 8;
    ctx.stroke(path);
    ctx.restore();

    $('hintIcon').textContent = icon;
    $('hintText').textContent = hint;
  }

  rafId = requestAnimationFrame(tick);
}

// ── Capture ───────────────────────────────────────────────────
async function capture() {
  // Cancel detection loop but keep stream alive while we grab the frame
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  const video = $('video');
  const vw = video.videoWidth || 1280, vh = video.videoHeight || 1280;
  const snap = mk(vw, vh);
  // Capture pixels FIRST while video is still playing
  snap.getContext('2d').drawImage(video, 0, 0);

  // Now safe to stop the camera
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  showScreen('screenProcessing');
  await processSnap(snap);
}

// ── Process ───────────────────────────────────────────────────
async function processSnap(snap) {
  const ids = ['ps1','ps2','ps3','ps4'];
  const step = n => ids.forEach((id,i) =>
    $(id).className = 'pstep' + (i<n?' done':i===n?' active':''));

  try {
    step(0);
    // 1) Если есть детекция из live-цикла (автозахват) — используем её,
    //    координаты совпадают с снимком т.к. снимок берётся из того же видео
    let det = lastLiveDet;

    // 2) Иначе (ручной снимок / галерея) — пробуем несколько размеров
    if (!det) {
      for (const inputSize of [512, 416, 320, 608, 224]) {
        try {
          det = await withTimeout(
            faceapi
              .detectSingleFace(snap, new faceapi.TinyFaceDetectorOptions({ inputSize, scoreThreshold:.2 }))
              .withFaceLandmarks(),
            5000, `detect@${inputSize}`
          );
          if (det) break;
        } catch (e) {
          console.warn(`Detection failed @ inputSize=${inputSize}:`, e);
        }
      }
    }

    if (!det) {
      safeAlert('Лицо не распознано. Попробуйте при лучшем освещении.');
      resetToCamera();
      return;
    }
    capturedDet = det;
    lastLiveDet = null;
    await wait(150);

    // ── 1. Локальное кадрирование 35×45 мм ─────────────────
    step(1);
    const cropped = makeCrop(snap, det);
    await wait(150);

    // ── 2. AI-обработка (Nano Banana через Supabase) ──────
    step(2);
    let aiImg;
    try {
      aiImg = await withTimeout(processWithAI(cropped), 60000, 'AI processing');
    } catch (e) {
      console.error('AI processing failed:', e);
      safeAlert(e.quota ? 'Дневной лимит AI исчерпан, попробуйте позже' : 'AI не сработал, показываю фото без обработки');
      aiImg = await c2i(cropped);  // fallback to plain crop
    }
    await wait(150);

    // ── 3. Готово ─────────────────────────────────────────
    step(3);
    capturedImg = aiImg;
    await wait(200);

    $('origThumb').src = snap.toDataURL('image/jpeg', 0.6);
    resetSliders();
    showScreen('screenResult');
    render();
    tg.MainButton.show();
  } catch (e) {
    console.error('processSnap error:', e);
    safeAlert('Ошибка обработки. Попробуйте ещё раз.');
    resetToCamera();
  }
}

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error(label + ' timeout')), ms))
  ]);
}

// Telegram tg.showAlert принимает строку до ~256 символов без \n
// и падает с WebAppPopupParamInvalid если что-то не так — оборачиваем
function safeAlert(msg) {
  try {
    const clean = String(msg).replace(/\s+/g, ' ').trim().slice(0, 200);
    tg.showAlert(clean);
  } catch (e) {
    console.error('Alert failed:', msg, e);
  }
}

// ── Local crop to 35×45 mm ────────────────────────────────────
function makeCrop(src, det) {
  const b   = det.detection.box;
  const pH  = b.height / fRatio;
  const pW  = pH * ASPECT;
  const cx  = b.x + b.width / 2;
  const cropX = cx - pW / 2;
  const cropY = b.y - pH * 0.16 - vOff;

  const out = mk(OUT_W, OUT_H);
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#f0f0ee';
  ctx.fillRect(0, 0, OUT_W, OUT_H);

  const sx = Math.max(0, cropX);
  const sy = Math.max(0, cropY);
  const sw = Math.min(src.width  - sx, pW - Math.max(0, -cropX));
  const sh = Math.min(src.height - sy, pH - Math.max(0, -cropY));
  const scX = OUT_W / pW, scY = OUT_H / pH;
  const dx = Math.max(0, -cropX) * scX;
  const dy = Math.max(0, -cropY) * scY;
  ctx.drawImage(src, sx, sy, sw, sh, dx, dy, sw * scX, sh * scY);
  return out;
}

// ── AI-обработка через Supabase Edge Function (Nano Banana) ──
async function processWithAI(canvas) {
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const userId  = tg.initDataUnsafe?.user?.id?.toString() || 'anonymous';

  const res = await fetch(FN_URL, {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${SUPA_ANON}`,
      'apikey':        SUPA_ANON
    },
    body: JSON.stringify({ image: dataUrl, mimeType: 'image/jpeg', userId })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (err.code === 'QUOTA_EXCEEDED') {
      const e = new Error('Дневной лимит AI исчерпан, попробуйте завтра');
      e.quota = true;
      throw e;
    }
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  if (!data.image) throw new Error('No image in response');

  return await new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Failed to load AI image'));
    img.src = data.image;
  });
}

// ── Background removal (legacy fallback, no longer used) ─────
function removeBg(src) {
  return new Promise(resolve => {
    const out = mk(src.width, src.height);
    const ctx = out.getContext('2d');
    let done = false;

    const fallback = () => {
      if (done) return; done = true;
      ctx.fillStyle = '#f0f0ee';
      ctx.fillRect(0, 0, src.width, src.height);
      ctx.drawImage(src, 0, 0);
      resolve(out);
    };

    // Hard timeout: if MediaPipe hangs, just use original on white bg
    const timer = setTimeout(fallback, 7000);

    try {
      segment.onResults(({ segmentationMask }) => {
        if (done) return; done = true;
        clearTimeout(timer);

        ctx.fillStyle = '#f0f0ee';
        ctx.fillRect(0, 0, out.width, out.height);

        const tmp = mk(src.width, src.height);
        const tc  = tmp.getContext('2d');
        tc.drawImage(src, 0, 0);
        tc.globalCompositeOperation = 'destination-in';
        tc.drawImage(segmentationMask, 0, 0, src.width, src.height);

        ctx.drawImage(tmp, 0, 0);
        resolve(out);
      });

      segment.send({ image: src }).catch(fallback);
    } catch (e) {
      clearTimeout(timer);
      fallback();
    }
  });
}

// ── Skin retouch ─────────────────────────────────────────────
function retouch(src) {
  const w = src.width, h = src.height;
  const out = mk(w, h), octx = out.getContext('2d');

  // Create blurred copy
  octx.filter = 'blur(1.5px)'; octx.drawImage(src, 0, 0); octx.filter = 'none';
  const blur = octx.getImageData(0, 0, w, h).data;

  octx.drawImage(src, 0, 0);
  const img = octx.getImageData(0, 0, w, h), d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
    if (a < 20) continue;
    const skin = r>80 && g>50 && b>30 && r>g && r>b && (r-Math.min(g,b))>18 && r<252;
    if (skin) {
      d[i]   = Math.round(r*.60 + blur[i]  *.40);
      d[i+1] = Math.round(g*.60 + blur[i+1]*.40);
      d[i+2] = Math.round(b*.60 + blur[i+2]*.40);
    }
  }
  octx.putImageData(img, 0, 0);
  return out;
}

// ── Render result ─────────────────────────────────────────────
function render() {
  if (!capturedImg) return;
  drawResult(); validate();
}

function drawResult() {
  const canvas = $('resultCanvas'), ctx = canvas.getContext('2d');
  canvas.width = OUT_W; canvas.height = OUT_H;
  ctx.fillStyle = '#f0f0ee'; ctx.fillRect(0, 0, OUT_W, OUT_H);
  // capturedImg уже 684×883 после AI-обработки
  ctx.drawImage(capturedImg, 0, 0, OUT_W, OUT_H);

  const badge = $('faceBadge');
  badge.textContent = '✨ AI обработка';
  badge.style.background = 'rgba(39,174,96,.85)';
}

function validate() {
  $('resultCanvas').toBlob(blob => {
    const mb = blob.size/1024/1024, mbOk = mb<=MAX_MB;
    $('checks').innerHTML = [
      { ok:true, l:'Лицо обнаружено',          d:'Автоматически' },
      { ok:true, l:'Кадр 35×45 мм',            d:'ICAO раскладка' },
      { ok:true, l:'Фон заменён',              d:'AI · светлый ровный' },
      { ok:true, l:'Ретушь кожи',              d:'AI · профессиональная' },
      { ok:true, l:`${OUT_W}×${OUT_H} px`,     d:'Мин. 684×883 ✓' },
      { ok:mbOk, l:`${mb.toFixed(2)} МБ`,      d:mbOk?'Макс. 2.5 МБ ✓':'Снизьте JPG' },
    ].map(i=>`<div class="check-item"><span>${i.ok?'✅':'⚠️'}</span>
      <div><div class="ci-lbl">${i.l}</div><div class="ci-det">${i.d}</div></div></div>`).join('');
    tg.MainButton.setText(`⬇ Скачать JPG · ${mb.toFixed(2)} МБ`);
  }, 'image/jpeg', jpgQ);
}

// ── Controls ──────────────────────────────────────────────────
$('vPos').addEventListener('input', function() {
  vOff=+this.value; $('vPosLbl').textContent=vOff>0?'+'+vOff:vOff; render();
});
$('faceScale').addEventListener('input', function() {
  fRatio=+this.value/100; $('scaleLbl').textContent=this.value+'%'; render();
});
$('jpgQual').addEventListener('input', function() {
  jpgQ=+this.value/100; $('qualLbl').textContent=this.value+'%'; render();
});

$('captureBtn').addEventListener('click', capture);

$('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  stopCamera(); showScreen('screenProcessing');
  const imgEl = await loadImg(file);
  const snap  = mk(imgEl.naturalWidth, imgEl.naturalHeight);
  snap.getContext('2d').drawImage(imgEl, 0, 0);
  await processSnap(snap);
});

$('retakeBtn').addEventListener('click', resetToCamera);

tg.MainButton.onClick(() => {
  $('resultCanvas').toBlob(blob => {
    const a = Object.assign(document.createElement('a'), {
      href:URL.createObjectURL(blob), download:'biometric_photo.jpg'
    });
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }, 'image/jpeg', jpgQ);
});

// ── Helpers ───────────────────────────────────────────────────
function showScreen(n) {
  ['screenCamera','screenProcessing','screenResult'].forEach(id =>
    $(id).classList.toggle('hidden', id!==n));
}
function resetToCamera() {
  tg.MainButton.hide();
  capturedImg = capturedDet = lastLiveDet = null;
  goodFrames = 0; resetSliders();
  $('ringCircle').style.strokeDashoffset = RING_C;
  showScreen('screenCamera'); startCamera();
}
function resetSliders() {
  vOff=0; fRatio=0.75; jpgQ=0.92;
  $('vPos').value=0;      $('vPosLbl').textContent='0';
  $('faceScale').value=75; $('scaleLbl').textContent='75%';
  $('jpgQual').value=92;   $('qualLbl').textContent='92%';
}
function mk(w,h) { const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }
function c2i(canvas) {
  return new Promise(r => { const i=new Image(); i.onload=()=>r(i); i.src=canvas.toDataURL('image/jpeg',.95); });
}
function loadImg(file) {
  return new Promise((r,j) => {
    const i=new Image(), u=URL.createObjectURL(file);
    i.onload=()=>{ URL.revokeObjectURL(u); r(i); }; i.onerror=j; i.src=u;
  });
}
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

init().catch(console.error);
</script>
